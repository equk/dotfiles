## kitty config
###
## github.com/equk

# Fonts
# (disable italic fonts)
font_family      JetBrains Mono
italic_font      JetBrains Mono
bold_font        JetBrains Mono Bold
bold_italic_font JetBrains Mono Bold

# Font size (in pts)
font_size        11.5

# Ligatures
disable_ligatures always

# Refresh rates
repaint_delay    0
input_delay      1
sync_to_monitor  no

# Style
window_border_width   0
cursor_blink_interval 0

# Disable bell
enable_audio_bell no

# Disable URLs
detect_urls no

# Disable Hyperlinks
allow_hyperlinks no

# DO NOT OPEN HYPERLINKS ON CLICK
mouse_map left click ungrabbed no-op

# Mouse Select
copy_on_select clipboard

# Mouse Paste
mouse_map right press ungrabbed paste_from_clipboard

# Color Theme
